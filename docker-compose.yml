services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job-scraper-api
    ports:
      - "8080:8080"
    volumes:
      - job-scraper-data:/data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Data Source=/data/jobscraper.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: job-scraper-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  job-scraper-data:
